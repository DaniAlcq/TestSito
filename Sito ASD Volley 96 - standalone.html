document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

8b1a3;\n  --fg-mute: #6b6557;\n  --accent: #ff0097;\n  --accent-deep: #c80077;\n  --accent-soft: #ff0097cc;\n  --cream: #ebe3d0;\n  --warn: #f6c243;\n  --ok: #6dd28a;\n  --display: 'Anton', 'Arial Narrow', sans-serif;\n  --serif: 'Instrument Serif', 'Times New Roman', serif;\n  --sans: 'DM Sans', system-ui, sans-serif;\n  --mono: 'JetBrains Mono', ui-monospace, monospace;\n  --r: 14px;\n  --r-sm: 8px;\n  --maxw: 1440px;\n}\n\n*{box-sizing:border-box;margin:0;padding:0;}\nhtml,body{background:var(--bg);color:var(--fg);font-family:var(--sans);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}\nbody{overflow-x:hidden;}\na{color:inherit;text-decoration:none;}\nimg,svg{display:block;max-width:100%;}\nbutton{font:inherit;color:inherit;background:none;border:none;cursor:pointer;}\n\n::selection{background:var(--accent);color:#fff;}\n\n.wrap{max-width:var(--maxw);margin:0 auto;padding:0 32px;}\n.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--fg-mute);display:inline-flex;align-items:center;gap:10px;}\n.eyebrow::before{content:\"\";width:24px;height:1px;background:var(--accent);}\n.h-display{font-family:var(--display);font-weight:400;line-height:0.85;letter-spacing:-0.01em;text-transform:uppercase;}\n.h-serif{font-family:var(--serif);font-weight:400;font-style:italic;}\n.btn{display:inline-flex;align-items:center;gap:12px;padding:14px 22px;border-radius:999px;font-family:var(--sans);font-weight:500;font-size:14px;transition:transform .25s ease, background .25s ease;}\n.btn-primary{background:var(--accent);color:#fff;}\n.btn-primary:hover{transform:translateY(-1px);background:#ff2aa6;}\n.btn-ghost{border:1px solid var(--line);color:var(--fg);}\n.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}\n.btn .arr{display:inline-block;transform:translateX(0);transition:transform .25s ease;}\n.btn:hover .arr{transform:translateX(4px);}\n\n/* ============ NAV ============ */\n.nav{position:fixed;top:0;left:0;right:0;z-index:50;backdrop-filter:blur(14px);background:rgba(12,11,9,0.65);border-bottom:1px solid rgba(255,255,255,0.04);}\n.nav-inner{max-width:var(--maxw);margin:0 auto;padding:14px 32px;display:flex;align-items:center;gap:32px;}\n.nav-brand{display:flex;align-items:center;gap:12px;flex-shrink:0;}\n.nav-brand .badge{width:38px;height:38px;border-radius:50%;background:#fff;display:grid;place-items:center;overflow:hidden;}\n.nav-brand .badge img{width:34px;height:34px;}\n.nav-brand .txt{display:flex;flex-direction:column;line-height:1;}\n.nav-brand .txt .t1{font-family:var(--display);font-size:18px;letter-spacing:0.02em;text-transform:uppercase;}\n.nav-brand .txt .t2{font-family:var(--mono);font-size:9px;letter-spacing:0.2em;color:var(--fg-mute);text-transform:uppercase;margin-top:3px;}\n.nav-links{display:flex;gap:28px;align-items:center;margin-left:24px;}\n.nav-links a{font-size:13px;color:var(--fg-dim);padding:6px 0;position:relative;transition:color .2s ease;}\n.nav-links a:hover{color:var(--fg);}\n.nav-links a::after{content:\"\";position:absolute;left:0;bottom:0;width:0;height:1px;background:var(--accent);transition:width .25s ease;}\n.nav-links a:hover::after{width:100%;}\n.nav-cta{margin-left:auto;display:flex;gap:10px;align-items:center;}\n.nav-cta .live{font-family:var(--mono);font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--fg-dim);display:flex;align-items:center;gap:8px;}\n.nav-cta .live .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 0 var(--accent);animation:pulse 2s infinite;}\n@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,0,151,.5);}70%{box-shadow:0 0 0 8px rgba(255,0,151,0);}100%{box-shadow:0 0 0 0 rgba(255,0,151,0);}}\n\n/* ============ HERO ============ */\n.hero{position:relative;padding:140px 0 80px;overflow:hidden;}\n.hero-grid{display:grid;grid-template-columns:1fr 380px;gap:48px;align-items:end;}\n.hero-meta{display:flex;flex-direction:column;gap:20px;font-family:var(--mono);font-size:11px;color:var(--fg-mute);letter-spacing:0.15em;text-transform:uppercase;}\n.hero-meta .row{display:flex;justify-content:space-between;padding-bottom:14px;border-bottom:1px solid var(--line-soft);}\n.hero-meta .row span:last-child{color:var(--fg);}\n.hero-title{margin-top:30px;position:relative;}\n.hero-title h1{font-family:var(--display);font-size:clamp(80px, 16vw, 260px);line-height:0.82;text-transform:uppercase;letter-spacing:-0.015em;}\n.hero-title h1 .line1{display:block;color:var(--fg);}\n.hero-title h1 .line2{display:block;color:var(--fg);position:relative;}\n.hero-title h1 .line2 .it{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--accent);text-transform:lowercase;letter-spacing:-0.02em;font-size:0.78em;vertical-align:0.06em;padding:0 0.08em;}\n\n.hero-side{display:flex;flex-direction:column;gap:24px;align-self:end;padding-bottom:8px;}\n.hero-logo{width:180px;height:180px;align-self:end;}\n.hero-logo img{width:100%;height:100%;filter:drop-shadow(0 12px 40px rgba(255,0,151,0.25));}\n.hero-desc{font-size:15px;line-height:1.5;color:var(--fg-dim);max-width:340px;align-self:end;text-align:right;}\n.hero-desc strong{color:var(--fg);font-weight:500;}\n\n.hero-foot{margin-top:60px;display:grid;grid-template-columns:1.2fr 1fr 1fr 1fr;gap:32px;align-items:end;padding-top:30px;border-top:1px solid var(--line-soft);}\n.hero-foot .actions{display:flex;gap:10px;flex-wrap:wrap;}\n.hero-foot .stat{display:flex;flex-direction:column;gap:6px;}\n.hero-foot .stat .n{font-family:var(--display);font-size:54px;line-height:0.9;color:var(--fg);}\n.hero-foot .stat .n .small{font-size:0.5em;color:var(--accent);vertical-align:0.25em;}\n.hero-foot .stat .l{font-family:var(--mono);font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--fg-mute);}\n\n.marquee{margin-top:80px;border-top:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft);padding:18px 0;overflow:hidden;mask-image:linear-gradient(to right, transparent, #000 8%, #000 92%, transparent);}\n.marquee-track{display:flex;gap:48px;width:max-content;animation:marquee 38s linear infinite;}\n.marquee-track span{font-family:var(--display);font-size:34px;text-transform:uppercase;letter-spacing:0.02em;color:var(--fg);display:inline-flex;align-items:center;gap:48px;}\n.marquee-track span::after{content:\"●\";color:var(--accent);font-size:18px;}\n@keyframes marquee{to{transform:translateX(-50%);}}\n\n.bg-grid{position:absolute;inset:0;background-image:linear-gradient(to right,rgba(255,255,255,0.025) 1px, transparent 1px);background-size:calc(100%/12) 100%;pointer-events:none;z-index:0;}\n.hero > .wrap{position:relative;z-index:1;}\n.hero::before{content:\"\";position:absolute;top:20%;right:-200px;width:600px;height:600px;background:radial-gradient(circle, rgba(255,0,151,0.18), transparent 70%);pointer-events:none;}\n\n/* ============ SECTION SHELL ============ */\nsection{padding:100px 0;position:relative;}\n.sec-head{display:grid;grid-template-columns:1fr auto;gap:32px;align-items:end;margin-bottom:48px;}\n.sec-head h2{font-family:var(--display);font-size:clamp(48px,7vw,96px);line-height:0.9;text-transform:uppercase;letter-spacing:-0.01em;}\n.sec-head h2 .it{font-family:var(--serif);font-style:italic;color:var(--accent);text-transform:lowercase;font-weight:400;letter-spacing:-0.02em;}\n.sec-head .meta{display:flex;flex-direction:column;gap:8px;align-items:flex-end;font-family:var(--mono);font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--fg-mute);text-align:right;}\n.sec-head .meta a{color:var(--fg);border-bottom:1px solid var(--accent);padding-bottom:2px;}\n\n/* ============ SQUADRE ============ */\n.teams-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:18px;}\n.team{position:relative;background:var(--bg-card);border:1px solid var(--line-soft);border-radius:var(--r);padding:24px;transition:border-color .3s ease, transform .3s ease;cursor:pointer;overflow:hidden;}\n.team:hover{border-color:var(--accent);transform:translateY(-3px);}\n.team .num{font-family:var(--display);font-size:24px;color:var(--fg-mute);position:absolute;top:18px;right:22px;}\n.team .img{aspect-ratio:4/3;border-radius:var(--r-sm);background:var(--bg-elev);margin-bottom:18px;position:relative;overflow:hidden;background-image:repeating-linear-gradient(135deg, rgba(255,255,255,0.025) 0 8px, transparent 8px 16px);}\n.team .img::after{content:attr(data-cat);position:absolute;bottom:10px;left:12px;font-family:var(--mono);font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--fg-mute);}\n.team .img .badge-cat{position:absolute;top:10px;left:12px;font-family:var(--mono);font-size:10px;letter-spacing:0.15em;text-transform:uppercase;background:var(--accent);color:#fff;padding:4px 8px;border-radius:4px;z-index:2;}\n.team .img .badge-cat.f{background:var(--accent);}\n.team .img[style*=\"background-image:url\"]::before{content:\"\";position:absolute;inset:0;background:linear-gradient(to top, rgba(0,0,0,0.6), transparent 60%);}\n.team h3{font-family:var(--display);font-size:30px;text-transform:uppercase;letter-spacing:-0.005em;line-height:0.95;}\n.team h3 .it{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--accent);text-transform:lowercase;font-size:0.85em;}\n.team .sub{font-family:var(--mono);font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--fg-mute);margin-top:8px;}\n.team .roster{display:flex;align-items:center;gap:8px;margin-top:14px;font-size:12px;color:var(--fg-dim);}\n.team .roster .athletes{display:flex;}\n.team .roster .athletes div{width:18px;height:18px;border-radius:50%;background:var(--bg-elev);border:2px solid var(--bg-card);margin-left:-6px;background-image:repeating-linear-gradient(45deg, var(--bg-elev) 0 3px, var(--line) 3px 6px);}\n.team .roster .athletes div:first-child{margin-left:0;}\n.team.big{grid-column:span 6;}\n.team.med{grid-column:span 4;}\n.team.sm{grid-column:span 3;}\n\n/* ============ RESULTS + CALENDAR ============ */\n.split{display:grid;grid-template-columns:1.35fr 1fr;gap:24px;}\n.panel{background:var(--bg-card);border:1px solid var(--line-soft);border-radius:var(--r);padding:30px;}\n.panel-head{display:flex;justify-content:space-between;align-items:baseline;padding-bottom:20px;border-bottom:1px solid var(--line);margin-bottom:18px;}\n.panel-head .t{font-family:var(--display);font-size:28px;text-transform:uppercase;letter-spacing:-0.005em;}\n.panel-head .l{font-family:var(--mono);font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--fg-mute);}\n\n.result{display:grid;grid-template-columns:60px 1fr auto 1fr 60px;gap:16px;align-items:center;padding:18px 4px;border-bottom:1px solid var(--line-soft);}\n.result:last-child{border-bottom:none;}\n.result .date{font-family:var(--mono);font-size:11px;color:var(--fg-mute);line-height:1.3;}\n.result .date .d{display:block;color:var(--fg);font-size:14px;}\n.result .team-a, .result .team-b{display:flex;align-items:center;gap:10px;}\n.result .team-b{flex-direction:row-reverse;text-align:right;}\n.result .team-name{font-family:var(--display);font-size:18px;text-transform:uppercase;line-height:1;letter-spacing:0.005em;}\n.result .team-name.us{color:var(--accent);}\n.result .team-name .league{display:block;font-family:var(--mono);font-size:9px;letter-spacing:0.15em;color:var(--fg-mute);margin-top:4px;}\n.result .crest{width:32px;height:32px;border-radius:50%;background:var(--bg-elev);display:grid;place-items:center;font-family:var(--display);font-size:13px;color:var(--fg-dim);flex-shrink:0;border:1px solid var(--line);}\n.result .crest.us{background:#fff;color:var(--accent);}\n.result .score{font-family:var(--display);font-size:36px;line-height:1;letter-spacing:0.02em;text-align:center;}\n.result .score .sep{color:var(--fg-mute);font-size:0.7em;padding:0 6px;}\n.result .score.win .home, .result .score.loss .away{color:var(--fg);}\n.result .score.win .away, .result .score.loss .home{color:var(--fg-mute);}\n.result .score.win .home{color:var(--accent);}\n.result .badge-r{font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;padding:3px 7px;border-radius:3px;}\n.result .badge-r.w{background:rgba(109,210,138,0.15);color:var(--ok);}\n.result .badge-r.l{background:rgba(255,255,255,0.05);color:var(--fg-mute);}\n\n.cal{display:flex;flex-direction:column;}\n.cal-item{display:grid;grid-template-columns:64px 1fr auto;gap:16px;padding:18px 4px;border-bottom:1px solid var(--line-soft);align-items:center;transition:background .2s;}\n.cal-item:hover{background:rgba(255,255,255,0.015);}\n.cal-item:last-child{border-bottom:none;}\n.cal-item .when{text-align:center;border-right:1px solid var(--line-soft);padding-right:14px;}\n.cal-item .when .day{font-family:var(--display);font-size:34px;color:var(--fg);line-height:1;}\n.cal-item .when .month{font-family:var(--mono);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--fg-mute);margin-top:4px;}\n.cal-item .when .time{display:block;font-family:var(--mono);font-size:11px;color:var(--accent);margin-top:6px;}\n.cal-item .match{display:flex;flex-direction:column;gap:4px;}\n.cal-item .match .vs{font-family:var(--display);font-size:18px;text-transform:uppercase;letter-spacing:0.005em;}\n.cal-item .match .vs .accent{color:var(--accent);}\n.cal-item .match .where{font-family:var(--mono);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--fg-mute);}\n.cal-item .where-chip{font-family:var(--mono);font-size:9px;letter-spacing:0.15em;text-transform:uppercase;padding:4px 8px;border-radius:3px;background:var(--bg-elev);color:var(--fg-dim);}\n.cal-item .where-chip.home{background:rgba(255,0,151,0.12);color:var(--accent);}\n\n/* ============ CLASSIFICA ============ */\n.standings{background:var(--bg-card);border:1px solid var(--line-soft);border-radius:var(--r);padding:30px;}\n.standings-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:24px;gap:16px;flex-wrap:wrap;}\n.standings-head .t{font-family:var(--display);font-size:32px;text-transform:uppercase;}\n.standings-head .switcher{display:flex;gap:4px;background:var(--bg-elev);padding:4px;border-radius:999px;}\n.standings-head .switcher button{padding:8px 14px;font-family:var(--mono);font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--fg-mute);border-radius:999px;}\n.standings-head .switcher button.active{background:var(--accent);color:#fff;}\n.standings table{width:100%;border-collapse:collapse;}\n.standings th{font-family:var(--mono);font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--fg-mute);text-align:right;padding:10px 8px;font-weight:400;border-bottom:1px solid var(--line);}\n.standings th:nth-child(1), .standings th:nth-child(2){text-align:left;}\n.standings td{padding:14px 8px;border-bottom:1px solid var(--line-soft);font-family:var(--sans);font-size:14px;color:var(--fg);text-align:right;}\n.standings td:nth-child(1), .standings td:nth-child(2){text-align:left;}\n.standings td:nth-child(1){font-family:var(--display);font-size:18px;color:var(--fg-mute);width:40px;}\n.standings td:nth-child(2){font-family:var(--display);font-size:18px;text-transform:uppercase;letter-spacing:0.005em;}\n.standings tr.us td:nth-child(1){color:var(--accent);}\n.standings tr.us td:nth-child(2){color:var(--accent);}\n.standings tr.us{background:rgba(255,0,151,0.04);}\n.standings td.pts{font-family:var(--display);font-size:20px;color:var(--fg);}\n.standings tr.us td.pts{color:var(--accent);}\n.standings .form{display:inline-flex;gap:3px;}\n.standings .form span{width:18px;height:18px;border-radius:3px;display:inline-grid;place-items:center;font-family:var(--mono);font-size:9px;color:#fff;}\n.standings .form .w{background:var(--ok);color:#0c0b09;}\n.standings .form .l{background:#3a3631;color:var(--fg-dim);}\n.standings .form .d{background:var(--warn);color:#0c0b09;}\n\n/* ============ NEWS ============ */\n.news-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}\n.news-card{background:var(--bg-card);border:1px solid var(--line-soft);border-radius:var(--r);overflow:hidden;transition:border-color .3s ease, transform .3s ease;cursor:pointer;display:flex;flex-direction:column;}\n.news-card:hover{border-color:var(--accent);transform:translateY(-3px);}\n.news-card .news-img{aspect-ratio:16/10;background:var(--bg-elev);background-image:repeating-linear-gradient(135deg, rgba(255,255,255,0.025) 0 8px, transparent 8px 16px);}\n.news-card .news-body{padding:24px;display:flex;flex-direction:column;gap:12px;flex:1;}\n.news-card .news-meta{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--fg-mute);}\n.news-card .news-meta span:first-child{color:var(--accent);}\n.news-card h3{font-family:var(--display);font-size:24px;text-transform:uppercase;letter-spacing:-0.005em;line-height:1.05;color:var(--fg);}\n.news-card p{font-size:14px;line-height:1.55;color:var(--fg-dim);flex:1;}\n.news-card .news-link{font-family:var(--mono);font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--fg);padding-top:8px;border-top:1px solid var(--line-soft);display:inline-flex;align-items:center;gap:8px;transition:color .2s;}\n.news-card:hover .news-link{color:var(--accent);}\n.news-card .news-link .arr{transition:transform .25s ease;}\n.news-card:hover .news-link .arr{transform:translateX(4px);}\n\n/* ============ SOCIETÀ ============ */\n.about{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:start;}\n.about .lead{font-family:var(--serif);font-size:34px;line-height:1.2;color:var(--fg);max-width:600px;}\n.about .lead em{font-style:italic;color:var(--accent);}\n.about .body{font-size:15px;line-height:1.65;color:var(--fg-dim);display:flex;flex-direction:column;gap:16px;}\n.about .body p::first-letter{color:var(--accent);}\n.values{margin-top:80px;display:grid;grid-template-columns:repeat(4,1fr);gap:2  <div class=\"wrap\">\n    <div class=\"sec-head reveal\">\n      <h2>Ultime <span class=\"it\">news<\u002Fspan><\u002Fh2>\n      <div class=\"meta\"><span>04 / Dalla società<\u002Fspan><a href=\"#news\">Archivio →<\u002Fa><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"news-grid reveal\" id=\"news-grid\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== SOCIETÀ ========== -->\n<section id=\"societa\">\n  <div class=\"wrap\">\n    <div class=\"sec-head reveal\">\n      <h2>La <span class=\"it\">società<\u002Fspan><\u002Fh2>\n      <div class=\"meta\"><span>05 / Chi siamo<\u002Fspan><a href=\"#contatti\">Contattaci →<\u002Fa><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"about reveal\">\n      <p class=\"lead\">\n        Nata nel <em>1996<\u002Fem> a Milazzo, l'ASD Volley '96 è il punto di riferimento della pallavolo nel comprensorio della <em>Riviera tirrenica<\u002Fem>. Trent'anni passati a costruire una scuola, una squadra, una <em>famiglia<\u002Fem>.\n      <\u002Fp>\n      <div class=\"body\">\n        <p>Abbiamo iniziato con un canestro e una rete in una palestra del centro. Oggi siamo otto squadre, oltre 180 tesserati, due tecnici federali e un'idea: la pallavolo che cresce le persone prima delle atlete.<\u002Fp>\n        <p>Crediamo in un settore giovanile sano, nella formazione continua dei nostri allenatori, in un rapporto trasparente con le famiglie. Il campionato è la conseguenza, non l'obiettivo. L'obiettivo è restare in palestra a vita.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"values reveal\" id=\"values\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== SPONSOR ========== -->\n<section id=\"sponsor\" class=\"sponsors\">\n  <div class=\"wrap\">\n    <div class=\"sec-head reveal\">\n      <h2>I nostri <span class=\"it\">partner<\u002Fspan><\u002Fh2>\n      <div class=\"meta\"><span>06 / Sponsor<\u002Fspan><a href=\"#contatti\">Diventa partner →<\u002Fa><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"sponsor-grid reveal\" id=\"sponsor-grid\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== FOOTER ========== -->\n<footer id=\"contatti\">\n  <div class=\"wrap\">\n    <div class=\"foot-grid\">\n      <div class=\"foot-brand\">\n        <div class=\"row\">\n          <div class=\"b\"><img src=\"c54871a9-6b14-43aa-a972-2075b620c610\" alt=\"logo\"><\u002Fdiv>\n          <h4 data-bind=\"brandName\">ASD Volley '96<span data-bind=\"brandLine\">Milazzo · 1996—2026<\u002Fspan><\u002Fh4>\n        <\u002Fdiv>\n        <p>Associazione Sportiva Dilettantistica affiliata FIPAV. Promuoviamo la pallavolo nel comprensorio di Milazzo dal 1996.<\u002Fp>\n        <a href=\"#\" class=\"btn btn-primary\" style=\"align-self:flex-start;margin-top:8px;\">Iscrivi tuo/a figlio/a <span class=\"arr\">→<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n      <div class=\"foot-col\">\n        <h5>Sede<\u002Fh5>\n        <div class=\"addr\" id=\"foot-addr\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"foot-col\">\n        <h5>Contatti<\u002Fh5>\n        <ul id=\"foot-contacts\"><\u002Ful>\n      <\u002Fdiv>\n      <div class=\"foot-col\">\n        <h5>Naviga<\u002Fh5>\n        <ul>\n          <li><a href=\"#squadre\">Squadre<\u002Fa><\u002Fli>\n          <li><a href=\"#risultati\">Risultati e calendario<\u002Fa><\u002Fli>\n          <li><a href=\"#classifica\">Classifiche<\u002Fa><\u002Fli>\n          <li><a href=\"#news\">News<\u002Fa><\u002Fli>\n          <li><a href=\"#societa\">La società<\u002Fa><\u002Fli>\n          <li><a href=\"#sponsor\">Sponsor e partner<\u002Fa><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"wordmark\">VOLLEY <span class=\"it\">novantasei<\u002Fspan><\u002Fdiv>\n    <div class=\"foot-bottom\">\n      <span id=\"foot-piva\">© ASD Volley '96<\u002Fspan>\n      <div class=\"socials\" id=\"foot-socials\"><\u002Fdiv>\n      <span>Made with passione a Milazzo · <a href=\"#admin\" style=\"color:inherit;border-bottom:1px dotted var(--fg
